#screamer
- type: entity
  id: Cartridge20mm
  name: cartridge (20mm FMJ)
  parent: BaseCartridge
  components:
  - type: Tag
    tags:
      - Cartridge
      - Cartridge20mm
  - type: CartridgeAmmo
    deleteOnSpawn: false
    proto: Bullet20mmBase
  - type: Sprite
    sprite: _Crescent/Objects/Turrets/Ammunition/Cartridge/screamer.rsi
    layers:
    - state: ap
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: StaticPrice
    price: 1

- type: entity
  id: Cartridge20mmFrag
  name: cartridge (20mm Fragmentation)
  parent: BaseCartridge
  components:
  - type: Tag
    tags:
      - Cartridge
      - Cartridge20mmFrag
  - type: CartridgeAmmo
    deleteOnSpawn: false
    proto: Bullet20mmFrag
  - type: Sprite
    sprite: _Crescent/Objects/Turrets/Ammunition/Cartridge/screamer.rsi
    layers:
    - state: heat
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: StaticPrice
    price: 1

