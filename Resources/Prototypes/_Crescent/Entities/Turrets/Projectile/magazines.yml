#vulcan
- type: entity
  id: Magazine35mm
  name: 35mm Armor Piercing drum
  description: A munitions drum designed for 35mm autocannons. Contains standard armor-piercing rounds. Effective against armored targets.
  parent: BaseItem
  components:
  - type: Tag
    tags:
    - Magazine35mm
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - Cartridge35mm
    proto: Cartridge35mm
    capacity: 80
    soundRack:
      path: /Audio/Weapons/Guns/Bolt/lmg_bolt_closed.ogg
      params:
        variation: 0.05
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/rifle_load.ogg
      params:
        variation: 0.05
  - type: Item
    size: Large
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _Crescent/Objects/Turrets/Ammunition/Magazine/striker.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    scale: 0.7, 0.7
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance

- type: entity
  id: Magazine35mmHE
  name: 35mm High Explosive drum
  description: A munitions drum designed for 35mm autocannons. Contains High Explosive projectiles. Effective against light targets and infantry.
  parent: BaseItem
  components:
  - type: Tag
    tags:
    - Magazine35mm
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - Cartridge35mmHE
    proto: Bullet35mmHE
    capacity: 80
    soundRack:
      path: /Audio/Weapons/Guns/Bolt/lmg_bolt_closed.ogg
      params:
        variation: 0.05
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/rifle_load.ogg
      params:
        variation: 0.05
  - type: Item
    size: Large
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _Crescent/Objects/Turrets/Ammunition/Magazine/striker.rsi
    layers:
    - state: base-plasma
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    scale: 0.7, 0.7
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance


