  description: A large box of ammunition compatible with 88mm Flak launchers.
  parent: BaseItem
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - CorpusShell
    proto: CorpusCartridge
    capacity: 30
  - type: Item
    size: Normal
  - type: Sprite
    sprite: _Crescent/Objects/Turrets/Ammunition/Magazine/corpus.rsi
    state: base
  - type: Tag
    tags:
      - CorpusBox

