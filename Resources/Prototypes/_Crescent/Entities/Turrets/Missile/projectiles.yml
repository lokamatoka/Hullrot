
- type: entity
  id: ShortbowRocketProjectile
  name: 48mm high-explosive fragmentation rocket
  description: Shit.
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: ProjectilePhasePrevent
  - type: ShipWeaponProjectile
  - type: Projectile
    damage:
      types:
        Structural: 200
        Blunt: 50
  - type: TimedDespawn
    lifetime: 15 #1500m
  - type: Sprite
    sprite: _Crescent/Objects/Turrets/Ammunition/Projectiles/shortbow.rsi
    layers:
      - state: base-projectile
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    maxIntensity: 50
    intensitySlope: 25
    totalIntensity: 500
    maxTileBreak: 2
  - type: PointLight
    radius: 3.5
    color: orange
    energy: 0.5
  - type: ProjectileIFF
    visualType: SquareReticle
    color: Red
  - type: HeatSeeking
    rotationSpeed: 10 # slow rotation so it isnt aimbot, still fairly accurate though
    acceleration: 120
    topSpeed: 100
    fieldOfView: 15
    defaultSeekingRange: 800
    guidanceAlgorithm: PurePursuit
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.15,-0.45,0.15,0.15"
        layer:
        - BulletImpassable
        mask:
        - Impassable
        - BulletImpassable
        hard: true
        density: 100
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:ExplodeBehavior


