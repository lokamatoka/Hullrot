- type: entity
  id: BulletPlasmaGatling
  name: unstable focused plasma bolt
  description: Uh oh.
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: ProjectilePhasePrevent # still do not remove
  - type: ProjectileIFF
    visualType: Circle
    color: "#ea86f7" #you have no idea how hard it was to see the previous IFF color
  - type: Projectile
    ignoreWeaponGrid: true
    damage:
      types:
        Structural: 320
        Radiation: 80
  - type: PointLight
    radius: 3.5
    color: purple
    energy: 0.5
  - type: TimedDespawn
    lifetime: 10 #1500
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/magic.rsi
    layers:
      - state: infernoshot
  - type: ShipWeaponProjectile

- type: entity
  id: BulletPlasmaBall
  name: unstable plasmaball
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: ProjectilePhasePrevent
  - type: ProjectileIFF
    visualType: Circle
    color: "#ea86f7"
  - type: ShipWeaponProjectile
  - type: Projectile
    ignoreWeaponGrid: true
    damage:
      types:
        Structural: 230
        Radiation: 120
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    maxIntensity: 220 #about 3 rounds to break plastit and has a 3x3ish explosion
    intensitySlope: 45
    totalIntensity: 900
    maxTileBreak: 6
  - type: PointLight
    radius: 3.5
    color: orange
    energy: 0.5
  - type: TimedDespawn
    lifetime: 12 #2100
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/magic.rsi
    layers:
      - state: magicm_yellow

- type: entity
  id: BulletPlasmaArc
  name: large unstable plasma arc
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: ProjectilePhasePrevent
  - type: ProjectileIFF
    visualType: Circle
    color: "#ea86f7"
  - type: ShipWeaponProjectile
  - type: Projectile
    ignoreWeaponGrid: true
    damage:
      types:
        Structural: 2300
        Radiation: 200
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    maxIntensity: 350 #2 hits breaks plastit wider range and more effective
    intensitySlope: 120
    totalIntensity: 5000
    maxTileBreak: 12
  - type: PointLight
    radius: 3.5
    color: orange
    energy: 0.5
  - type: TimedDespawn
    lifetime: 15 #2850
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/magic.rsi
    layers:
      - state: blastwave
